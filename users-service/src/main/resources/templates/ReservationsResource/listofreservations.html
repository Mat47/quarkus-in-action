{@org.acme.users.model.Reservation[] reservations}

<div id="listofreservations">
    <table>
        <thead>
        <tr>
            <th>ID</th>
            <th>Car ID</th>
            <th>Start day</th>
            <th>End day</th>
        </tr>
        </thead>
        {#for r in reservations}
        <tr>
            <td>{r.id}</td>
            <td>{r.carId}</td>
            <td>{r.startDay}</td>
            <td>{r.endDay}</td>
        </tr>
        {/for}
    </table>
</div>
